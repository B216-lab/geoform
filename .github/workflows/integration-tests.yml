name: Integration PR Check

on:
  pull_request:
    branches:
      - main
      - release/*
  workflow_dispatch:
    inputs:
      backend_image_tag:
        description: "Backend image tag to test against"
        required: true
        default: "main"
        type: string

permissions:
  contents: read
  packages: read

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure CI integration script is executable
        run: chmod +x ./scripts/run-integration-test-ci.sh

      - name: Run integration test stack
        env:
          BACKEND_IMAGE_TAG: ${{ github.event.inputs.backend_image_tag || 'main' }}
          BACKEND_IMAGE_REF: ghcr.io/${{ github.repository_owner }}/backend:${{ github.event.inputs.backend_image_tag || 'main' }}
          BACKEND_BOOTSTRAP_IMAGE_REF: ghcr.io/${{ github.repository_owner }}/backend-bootstrap:${{ github.event.inputs.backend_image_tag || 'main' }}
        run: ./scripts/run-integration-test-ci.sh

      - name: Upload integration artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-artifacts
          path: .artifacts/integration
          if-no-files-found: ignore
