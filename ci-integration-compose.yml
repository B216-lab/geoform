services:
  mock-api:
    image: stoplight/prism:5
    command: mock -h 0.0.0.0 -d /tmp/openapi/openapi.yaml
    volumes:
      - ./.ci/backend/openapi.yaml:/tmp/openapi/openapi.yaml:ro
    ports:
      - "4010:4010"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:4010"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    container_name: geoform-frontend-integration
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_DADATA_KEY: ${VITE_DADATA_KEY:-test}
        VITE_DADATA_API: ${VITE_DADATA_API:-http://suggestions.dadata.ru/suggestions/api/4_1/rs/suggest/address}
    ports:
      - "4173:4173"
    environment:
      - API_BASE_URL=http://mock-api:4010
    depends_on:
      mock-api:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:4173"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
